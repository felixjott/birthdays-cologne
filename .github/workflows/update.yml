name: Update birthday calendar

on:
  schedule:
    - cron: "0 6 * * *"  # täglich um 06:00 UTC (07:00 MEZ)
  workflow_dispatch:       # manueller Trigger über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate ICS from Google Sheet
        run: python3 generate.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add birthdays.ics
          git diff --cached --quiet || git commit -m "chore: update birthdays.ics from Google Sheet"
          git push
